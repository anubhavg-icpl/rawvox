# RawVox — local stack
#   rawvox:   the API + web console (port 8000)
#   searxng:  self-hosted uncensored meta-search (port 8888)
#
# Usage:
#   docker compose up -d
#   open http://localhost:8000
#
# GPU: nvidia runtime auto-detected. Comment out the `deploy:` block
# if you don't have an NVIDIA GPU + nvidia-container-toolkit.

services:
  rawvox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Lifts HF Hub rate limit at build time. Get a free token at
        # https://huggingface.co/settings/tokens (read scope is enough).
        # Set in .env or shell: HF_TOKEN=hf_xxxx
        HF_TOKEN: ${HF_TOKEN:-}
    image: rawvox:latest
    container_name: rawvox
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./transcripts:/app/transcripts
      - rawvox-models:/app/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/models/hf
      # Runtime HF token for any lazy downloads (e.g. user switches
      # whisper model size to large-v3 on first request).
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      # Point the search engine at the local SearXNG instance.
      # The Pipeline reads config/settings.yaml — this env is only
      # informational unless you wire it into the config loader.
      - SEARXNG_URL=http://searxng:8080
    depends_on:
      searxng:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  searxng:
    image: searxng/searxng:latest
    container_name: rawvox-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-rawvox-dev-secret-change-me}
    restart: unless-stopped

volumes:
  rawvox-models:
